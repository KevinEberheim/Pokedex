<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/dialog.css">
    <link rel="stylesheet" href="./styles/spinner.css">
    <link rel="stylesheet" href="./styles/responisve.css">
    <link rel="stylesheet" href="./styles/color.css">
    <script src="scripts/templates.js"></script>
</head>
<body onload="init()">
    <header class="bg_header">
        <div class="header_main_content_wrapper">
        <div class="header_content">
            <img src="img/favicon.png" alt="Pokedex_Logo">
            <h1 id="maintitle">Pokedex</h1>
        </div>
        <div class="inputWrapper">
            <input type="text" placeholder="Name of Pokemon" id="searchPokemon" class="searchInput">
            <p id="noticeInput" class="noticeInputPokemon"></p>
        </div>
        </div>
    </header>
    <main class="main_website">
        <div class="main_content">
            <section aria-labelledby="maintitle" class="pokemon_style" id="pokemon_load"></section>
            <div id="button_load" class="button_main_content"></div>
        </div>
        <dialog aria-labelledby="name_img" onclick="closeDialog()" onkeydown="pressArrowKey(event)"
            class="pictureDialogclass" id="pokemonDialog">
            <header id="dialogHeader" onclick="eventBubbling(event)">
                <h2 id="name_img">
                    Title Dialog
                </h2>
                <button aria-label="Dialog close" onclick="closeDialog()" class="closeButton">
                    &times;
                </button>
            </header>
            <main onclick="eventBubbling(event)" id="dialogMain">

            </main>
            <footer onclick="eventBubbling(event)" id="dialogFooter">

            </footer>
        </dialog>
    </main>
    <footer class="footer_main_website">&copy; 2025 Kevin Eberheim</footer>
</body>
<script src="script.js"></script>
</html>
